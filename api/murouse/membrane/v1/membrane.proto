syntax = "proto3";

package murouse.membrane.v1;

option go_package = "github.com/murouse/membrane/pkg/api/membrane/v1;membranev1";

import "google/protobuf/descriptor.proto";

enum Role{
  ROLE_UNSPECIFIED = 0;
  ROLE_USER = 1;
  ROLE_ADMIN = 2;
  // you can add
};

message Rule {
  repeated Role any_of = 1; // Достаточно иметь ХОТЯ БЫ ОДНУ из этих ролей (OR)
  repeated Role all_of = 2; // Нужно иметь ВСЕ эти роли одновременно (AND)

  repeated Rule nested_any_of = 3; // Связываются через ИЛИ (Хотя бы одно вложенное правило должно сработать)
  repeated Rule nested_all_of = 4; // Связываются через И (Все вложенные правила должны сработать)
};

message Policy {
  bool allow_unauthenticated = 1;
  optional Rule rule = 2;
}

extend google.protobuf.MethodOptions {
  Policy policy = 51235;
}

